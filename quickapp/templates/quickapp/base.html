{% load static %}
<!DOCTYPE html>
<html lang="en">
<head >
     <style>
    .navbar-custom {
      background-image: url('C:\Users\MYNAM\Downloads\quick_event2\quick_event\quickapp\static\css\nav-bar.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link {
      color: white;
    }

    .navbar-custom .nav-link:hover {
      color: yellow;
    }
  </style>
    

    <meta charset="UTF-8">
    <title>Quick Event Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'quickapp/css/style.css' %}">
    
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    

    <a class="navbar-brand text-white" href="/">Quick Event Planner</a>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        
        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white me-2">Welcome, {{ user.username }}</span>
                <form action="{% url 'logout' %}" method="POST">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>

                
                
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="{% url 'register' %}" class="btn btn-light btn-sm">Register</a>
            {% endif %}
            
           


        </div>
    </nav>
    {% if messages %}
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
      {{ message|safe }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
  {% endfor %}
{% endif %}

</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'quickapp/js/script.js' %}"></script>
</body>
</html>
